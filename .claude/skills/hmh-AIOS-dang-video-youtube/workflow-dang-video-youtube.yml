# Đăng video Lark Base -> YouTube. Đặt file này vào .github/workflows/ của repo.
# Gọi qua HTTP: POST /repos/<user>/<repo>/dispatches
#   body {"event_type":"dang-video-youtube","client_payload":{"record_id":"rec...","base_id":"...","table_post":"..."}}
# record_id: đăng đúng 1 dòng (nút bấm Lark). Bỏ trống -> quét tất cả dòng "Chờ đăng".
name: dang-video-youtube

on:
  repository_dispatch:
    types: [dang-video-youtube]
  workflow_dispatch:
    inputs:
      record_id: { description: "record_id 1 dòng (bỏ trống = quét Chờ đăng)", required: false }

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Đăng video lên YouTube
        env:
          # ---- Bí mật -> GitHub Secrets ----
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          YT_OAUTH_CLIENT_SECRET: ${{ secrets.YT_OAUTH_CLIENT_SECRET }}
          YT_OAUTH_REFRESH_TOKEN: ${{ secrets.YT_OAUTH_REFRESH_TOKEN }}
          # ---- Không bí mật -> Variables, client_payload ghi đè nếu có ----
          LARK_APP_ID: ${{ vars.LARK_APP_ID }}
          LARK_DOMAIN: ${{ github.event.client_payload.domain || vars.LARK_DOMAIN }}
          LARK_BASE_ID: ${{ github.event.client_payload.base_id || vars.LARK_BASE_ID }}
          TABLE_POST:  ${{ github.event.client_payload.table_post || vars.TABLE_POST }}
          YT_OAUTH_CLIENT_ID: ${{ vars.YT_OAUTH_CLIENT_ID }}
          YT_CATEGORY_ID: ${{ vars.YT_CATEGORY_ID }}
          YT_PRIVACY: ${{ vars.YT_PRIVACY }}
          # ---- Nút bấm Lark gửi kèm record_id ----
          RECORD_ID: ${{ github.event.client_payload.record_id || inputs.record_id }}
        run: node ".claude/skills/hmh-AIOS-dang-video-youtube/scripts/post-video-youtube.mjs"
