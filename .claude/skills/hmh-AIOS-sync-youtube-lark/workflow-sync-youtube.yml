# Lấy dữ liệu kênh + video YouTube -> Lark Base. Đặt vào .github/workflows/ của repo.
# Gọi qua HTTP: POST /repos/<user>/<repo>/dispatches
#   body {"event_type":"sync-youtube","client_payload":{"channel":"@handle","base_id":"...","table_channel":"...","table_video":"..."}}
# client_payload (không bí mật) GHI ĐÈ Variables -> 1 repo phục vụ nhiều kênh/nhiều base.
name: sync-youtube

on:
  repository_dispatch:
    types: [sync-youtube]
  workflow_dispatch:
    inputs:
      channel: { description: "Kênh YouTube (@handle hoặc UCxxxx)", required: false }

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sync YouTube -> Lark
        env:
          # ---- Bí mật -> GitHub Secrets ----
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_NOTIFY_WEBHOOK: ${{ secrets.LARK_NOTIFY_WEBHOOK }}
          # ---- Không bí mật -> Variables, client_payload ghi đè nếu có ----
          LARK_APP_ID:  ${{ vars.LARK_APP_ID }}
          LARK_DOMAIN:  ${{ github.event.client_payload.domain || vars.LARK_DOMAIN }}
          LARK_BASE_ID: ${{ github.event.client_payload.base_id || vars.LARK_BASE_ID }}
          TABLE_CHANNEL: ${{ github.event.client_payload.table_channel || vars.TABLE_CHANNEL }}
          TABLE_VIDEO:   ${{ github.event.client_payload.table_video || vars.TABLE_VIDEO }}
          YT_CHANNEL: ${{ github.event.client_payload.channel || inputs.channel || vars.YT_CHANNEL }}
        run: node ".claude/skills/hmh-AIOS-sync-youtube-lark/scripts/sync-youtube-lark.mjs"
